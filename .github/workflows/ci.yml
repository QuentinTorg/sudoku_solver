name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  lint-test-coverage:
    runs-on: ubuntu-latest
    env:
      COVERAGE_FAIL_UNDER: "99"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Ruff Format Check
        run: ruff format --check .

      - name: Ruff Lint
        run: ruff check .

      - name: Mypy
        run: mypy

      - name: Unit Tests
        run: python -m unittest discover -s tests -t . -v

      - name: Coverage (Branch)
        run: |
          python -m coverage run --branch --source=sudoku_solver -m unittest discover -s tests -t .
          python -m coverage report -m --fail-under=${COVERAGE_FAIL_UNDER} | tee coverage.txt
          python -m coverage xml -o coverage.xml

      - name: Coverage Summary
        if: always()
        run: |
          {
            echo "## Coverage Report"
            echo
            echo '```text'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  nightly-datasets:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Dataset Regression (top95)
        run: python -m sudoku_solver --puzzle-file puzzles/top95.txt --max-failures 1

      - name: Dataset Regression (top1465)
        run: python -m sudoku_solver --puzzle-file puzzles/top1465.txt --max-failures 1

      - name: Benchmark top1465
        run: |
          python scripts/benchmark.py puzzles/top1465.txt --progress-every 0 --top-slowest 15 | tee benchmark_top1465.txt

      - name: Upload Benchmark Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-top1465
          path: benchmark_top1465.txt
